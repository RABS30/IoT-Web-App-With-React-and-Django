server {
    listen 80;
    server_name rabs.my.id;
    return 301 https://$host$request_uri;
}


server {

    listen              443 ssl;
    server_name         rabs.my.id;
    keepalive_timeout   70;

    ssl_certificate     /etc/nginx/ssl/certificate.pem;
    ssl_certificate_key /etc/nginx/ssl/private.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;
    
    # KUNCI PERBAIKAN: Support React Router
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Jika url selain yang ditentukan dipanggil, Nginx akan tetap memberikan index.html
        try_files $uri $uri/ /index.html;
    }

    # Static Files Django (Admin CSS, dll)
    location /static/ {
        alias /app/staticfiles/;
    }

    location /api/static/ {
        alias /app/staticfiles/;
    }


    # Media Files Django
    location /media/ {
        alias /var/www/media/;
    }

    # Proxy ke Backend Django API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    # Proxy ke Django Admin
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    # Proxy websocket
    location /api/ws/ {
    proxy_pass http://backend:8000;  # Arahkan ke service backend rabs
    
    # Konfigurasi wajib WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Header tambahan (sama seperti API biasa)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    # Pengaturan Timeout (Penting untuk IoT)
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
}